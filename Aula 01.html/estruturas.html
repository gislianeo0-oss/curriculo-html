<!DOCTYPE html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
 
<body>
    <form>
        <fieldset>
 
            <div>
 
            <label for="">Nome Completo</label>
            <input required type="text" name="nomeCompleto" id="nomeCompleto">
            <!-- Padrão de nomeclatura: nomeCompleto - camelcase -->
             </div>
 
             <div>
 
            <label for="email">E-mail</label>
           <input required type="email" name="email" id="email">
           
        </div>
 
         <div>
 
            <label for="senha">Senha</label>
           <input required type="password" name="senha" id="email">
           
        </div>
 
        <div>
            <label for="telefone">Telefone</label>
            <input required type="telefone" name="telefone" placeholder="(11)99999-9999">
        </div>
 
        <div>
            <label for="Mensagem">Mensagem</label>
            <textarea name="mensagem" rows="s" id="mensagem"></textarea>
        </div>
 
        <div>
            <label for="estadoCivil">Estado Civil</label>
            <select name="estadoCivil" id="estadoCivil">
            <option value="casado">Casado</option>
            <option value="solteiro">Solteiro</option>
            <option value="viuvo">Viúvo</option>
            <option value="divorciado">Divorciado</option>
            </select>
        </div>
 
        <div>
            <label for="dataNascimento">Data de Nascimento</label>
            <input type="date" name="dataNascimento" id="dataNascimento">
        </div>
 
        <div>
            <input type="file" name="arquivo" id="dataNascimento">
        </div>
 
        <button type="submit">Enviar Mensagem</button>
        <button type="reset">Limpar Formulário</button>
 
 
 
        </fieldset>
 
    </form>
 
</body>
 
</html>
